services:
  - type: web
    name: ai-tender-backend
    env: python
    branch: main
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        fromSecret: SECRET_KEY
      - key: DATABASE_URL
        fromSecret: DATABASE_URL
      - key: ALLOWED_ORIGINS
        value: "https://your-vercel-app-url.com"
      - key: ENVIRONMENT
        value: "production"
    plan: starter
